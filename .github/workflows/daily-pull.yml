name: Daily PTAGIS pull

on:
  schedule:
    # 11:00 UTC = 04:00 Pacific (during PDT). Adjust as you like.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

permissions:
  contents: write         # needed to commit updated data back

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::readr
            any::dplyr
            any::yaml
            any::fs
            any::glue
            any::janitor
            any::rprojroot

      - name: Run PTAGIS fetch
        # PTAGIS scheduled-export files are served without auth, so
        # no credentials are needed in CI. If that ever changes, add
        # PTAGIS_USER / PTAGIS_PASS as repo secrets and pass them
        # via env: here - the R script picks them up automatically.
        run: Rscript R/fetch_ptagis.R

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily PTAGIS pull: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
