name: Daily PTAGIS pull

on:
  schedule:
    # 11:00 UTC = 04:00 Pacific (during PDT). Adjust as you like.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger manually from the Actions tab

permissions:
  contents: write         # needed to commit updated data back

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::readr
            any::dplyr
            any::yaml
            any::fs
            any::glue
            any::janitor
            any::rprojroot
            any::tibble

      - name: Run PTAGIS fetch
        # PTAGIS scheduled-export files are served without auth, so
        # no credentials are needed in CI. If that ever changes, add
        # PTAGIS_USER / PTAGIS_PASS as repo secrets and pass them
        # via env: here - the R script picks them up automatically.
        run: Rscript R/fetch_ptagis.R

      - name: Build site metadata (lat/lon for the map)
        run: Rscript R/build_site_metadata.R

      - name: Pull Wells Dam DART counts
        # Currently a no-op placeholder until the DART URL is finalised.
        # See the script header for how to wire it in.
        run: Rscript R/fetch_dart_wells.R

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ config/site_metadata.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Daily data pull: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Race-tolerant push: if someone pushed while the
          # workflow was running (e.g. a manual commit), rebase
          # on top of the new tip and try again.
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push attempt $i was rejected; rebasing and retrying..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "Push still failing after 3 attempts."
          exit 1
